name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check dist contents
        run: ls -la dist/ && find dist -maxdepth 2 -type f | head -50

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        run: |
          lftp -e "
            set ssl:verify-certificate false;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --verbose --no-perms --parallel=5 dist/ /home/u961995747/domains/othmanewp.com/public_html/;
            bye
          "